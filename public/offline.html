<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Mckeywa Projects</title>
  <style>
    body {
      font-family: 'Josefin Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #1f2937;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .offline-container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
    }
    
    .offline-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.6;
    }
    
    .offline-title {
      font-size: 24px;
      font-weight: 700;
      color: #d27015;
      margin-bottom: 16px;
    }
    
    .offline-description {
      font-size: 16px;
      color: #64748b;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    
    .offline-features {
      text-align: left;
      margin: 30px 0;
    }
    
    .feature-item {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      padding: 12px;
      background: #f8fafc;
      border-radius: 8px;
      border-left: 4px solid #d27015;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      color: #d27015;
    }
    
    .retry-button {
      background: #d27015;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .retry-button:hover {
      background: #b8621a;
      transform: translateY(-2px);
    }
    
    .connection-status {
      margin-top: 20px;
      padding: 12px;
      background: #fef3c7;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .online { color: #059669; }
    .offline { color: #dc2626; }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1l22 22M12 17l9.5-9.5L12 17z"/>
        <path d="M1 12l4-4 4 4v4M3 12l4 4-4 4v4"/>
        <path d="M12 2a10 10 0 00-10 10"/>
      </svg>
    </div>
    
    <h1 class="offline-title">You're Offline</h1>
    <p class="offline-description">
      No internet connection detected. Some content may not be available, but you can still browse cached pages.
    </p>
    
    <div class="offline-features">
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <path d="M9 11H15M12 15v2M9 19H15"/>
          </svg>
        </div>
        <div>
          <strong>Cached Pages Available</strong><br>
          <small>Home, About, Services, Contact pages</small>
        </div>
      </div>
      
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 5h14M4 12h14M5 19h14"/>
          </svg>
        </div>
        <div>
          <strong>Contact Information</strong><br>
          <small>Phone: +27-12-322-6786</small>
        </div>
      </div>
      
      <div class="feature-item">
        <div class="feature-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 4M12 6l-4-4"/>
          </svg>
        </div>
        <div>
          <strong>Business Hours</strong><br>
          <small>Mon-Fri: 8:00-17:00</small>
        </div>
      </div>
    </div>
    
    <button class="retry-button" onclick="window.location.reload()">
      Try Again
    </button>
    
    <div class="connection-status">
      <span id="connection-indicator" class="offline">● Offline</span>
      <span>Checking connection...</span>
    </div>
  </div>
  
  <script>
    // Check connection status
    function checkConnection() {
      const indicator = document.getElementById('connection-indicator');
      
      if (navigator.onLine) {
        indicator.textContent = '● Online';
        indicator.className = 'online';
      } else {
        indicator.textContent = '● Offline';
        indicator.className = 'offline';
      }
    }
    
    // Initial check
    checkConnection();
    
    // Listen for connection changes
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', checkConnection);
    
    // Auto-retry when online
    window.addEventListener('online', () => {
      setTimeout(() => {
        window.location.reload();
      }, 2000);
    });
  </script>
</body>
</html>
