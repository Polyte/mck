[build]
  base = "/"
  command = "npm run build"
  publish = "build"
  functions = "netlify/functions"

# Ensure shared DeepSeek parser is bundled with functions (required from netlify/functions/chat.js)
[functions]
  included_files = ["lib/deepseekChatResponse.cjs"]

[build.environment]
  NPM_VERSION = "8"
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max-old-space-size=4096"
  VITE_NODE_OPTIONS = "--max-old-space-size=4096"

# Route /api/* to Netlify Functions
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[context.fallback]
  command = "echo 'Using fallback deployment - copying pre-built files'"
  publish = "build"

[[plugins]]
  package = "@netlify/plugin-lighthouse"
