[build]
  base = "/"
  command = "npm run build"
  publish = "build"

[build.environment]
  NPM_VERSION = "8"
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max-old-space-size=4096"
  VITE_NODE_OPTIONS = "--max-old-space-size=4096"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[context.fallback]
  command = "echo 'Using fallback deployment - copying pre-built files'"
  publish = "build"

# Disable Next.js plugin for Vite project
[[plugins]]
  package = "@netlify/plugin-nextjs"
  [plugins.inputs]
    skip = true

# Vite-specific configuration
[[plugins]]
  package = "@netlify/plugin-lighthouse"
